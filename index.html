<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Buddy - Ultra Fast</title>
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --primary-lime: #b4f350;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Dashboard Styling */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .app-name { color: var(--primary-lime); font-weight: bold; font-size: 18px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        
        .option-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .box-big { grid-column: span 2; background-color: var(--primary-lime); color: black; }
        .box-title { font-size: 20px; font-weight: 800; text-transform: uppercase; line-height: 1; }
        .box-icon { font-size: 28px; margin-bottom: 15px; }

        /* Talk Mode UI */
        #talk-mode {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .ai-orb-container { position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* New Theme-Matched Mic Button */
        .mic-orb {
            width: 140px; height: 140px; border-radius: 50%;
            background: var(--primary-lime);
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: black; z-index: 10; cursor: pointer;
            box-shadow: 0 0 30px rgba(180, 243, 80, 0.3);
        }

        .pulse-ring {
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid var(--primary-lime); opacity: 0;
        }

        .active .pulse-ring { animation: theme-pulse 1.2s infinite; opacity: 1; }

        @keyframes theme-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .exit-btn { position: absolute; bottom: 50px; color: var(--text-sub); border: 1px solid #333; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="app-name">AI BUDDY</span>
        <div id="menu-btn" style="cursor:pointer">☰</div>
    </div>

    <div id="dashboard">
        <div style="padding: 20px; font-size: 24px; font-weight: bold;">Hello, Michael</div>
        <div class="options-grid">
            <div class="option-box box-big" onclick="enterTalk()">
                <div class="box-icon">🎙️</div>
                <div class="box-title">TALK WITH ME</div>
            </div>
            <div class="option-box" style="background: rgba(162, 89, 255, 0.1);">
                <div class="box-icon">💬</div>
                <div class="box-title" style="color: #a259ff;">CHAT</div>
            </div>
            <div class="option-box" style="background: rgba(255, 112, 175, 0.1);">
                <div class="box-icon">🔍</div>
                <div class="box-title" style="color: #ff70af;">VISION</div>
            </div>
        </div>
    </div>

    <div id="talk-mode">
        <div id="status" style="margin-bottom: 40px; color: #888; letter-spacing: 2px;">READY</div>
        <div class="ai-orb-container" id="orb-wrap">
            <div class="mic-orb" id="mic-main">🎤</div>
            <div class="pulse-ring"></div>
        </div>
        <div class="exit-btn" onclick="exitTalk()">CLOSE</div>
    </div>

    <script>
        const GEMINI_API = "AIzaSyBjd-VTrMUMVaGfaCR1pVMaGeeMDuA-LlU";
        const ELEVEN_KEY = "sk_c10165ba95470d51b2884d4777576c971135813ccfaf45c0";
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL";

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        function enterTalk() { document.getElementById('talk-mode').style.display = 'flex'; }
        function exitTalk() { document.getElementById('talk-mode').style.display = 'none'; }

        document.getElementById('mic-main').onclick = () => {
            recognition.start();
            document.getElementById('orb-wrap').classList.add('active');
            document.getElementById('status').innerText = "LISTENING";
        };

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('orb-wrap').classList.remove('active');
            document.getElementById('status').innerText = "THINKING";

            // English-only prompt for faster & better reasoning
            const reply = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_API}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: "You are a bold, realistic English speaking female friend named Bella. Give short, human-like answers. User: " + text }] }] })
            }).then(r => r.json()).then(d => d.candidates[0].content.parts[0].text);

            document.getElementById('status').innerText = "SPEAKING";
            document.getElementById('orb-wrap').classList.add('active');
            await speak(reply);
            document.getElementById('status').innerText = "READY";
            document.getElementById('orb-wrap').classList.remove('active');
        };

        async function speak(text) {
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=3`, {
                method: "POST",
                headers: { "xi-api-key": ELEVEN_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_turbo_v2" }) // Turbo model is faster
            });
            const blob = await res.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            return new Promise(r => { audio.onended = r; audio.play(); });
        }
    </script>
</body>
</html>
