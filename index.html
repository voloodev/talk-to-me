<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Buddy - Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="icon.png" type="image/png">

    <style>
        :root {
            --bg-color: #0a0a0c;
            --primary-lime: #b4f350; /* Fancy Lime from image */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------------------------------
           Frosted Glass Login Screen
           --------------------------------- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.5s;
        }
        .glass-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 85%; max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .glass-box h2 { color: var(--primary-lime); margin-bottom: 5px; }
        .glass-box p { color: var(--text-sub); font-size: 14px; margin-bottom: 20px; }
        
        .glass-input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }
        .btn-lime {
            background-color: var(--primary-lime);
            color: black;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
        }

        /* ---------------------------------
           Main App UI (Two Modes)
           --------------------------------- */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 35px; height: 35px; border-radius: 8px; }
        .app-name { color: var(--primary-lime); font-weight: bold; font-size: 18px; }
        
        /* ---------------------------------
           Dashboard Mode (Main UI)
           --------------------------------- */
        #dashboard-mode {
            flex: 1; display: flex; flex-direction: column; padding: 20px;
        }
        .welcome-text { font-size: 28px; margin: 20px 0; }

        /* Multiple Sized Glass Boxes (Grid) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            margin-top: 20px;
        }

        .option-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .option-box:active { transform: scale(0.97); }

        /* Top Left Icon */
        .box-icon { font-size: 24px; color: var(--text-sub); margin-bottom: 10px;}
        /* Top Right Fancy Textr (as requested) */
        .fancy-textr {
            position: absolute; top: 15px; right: 20px;
            color: var(--primary-lime); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        }

        .box-title { font-size: 18px; font-weight: bold; }

        /* Specific Sizes based on image */
        .box-big { grid-column: span 2; background-color: var(--primary-lime); color: black; padding: 30px; }
        .box-big .fancy-textr { color: black; opacity: 0.5; }
        .box-big .box-icon {color: black; opacity: 0.7;}

        .box-tall { grid-row: span 2; }

        /* ---------------------------------
           Talk (Voice) Mode UI
           --------------------------------- */
        #talk-mode {
            flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center;
            position: relative; padding: 20px;
        }
        .exit-talk {
            position: absolute; top: 20px; right: 20px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: white; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .ai-status { color: var(--text-sub); text-transform: uppercase; font-size: 14px; letter-spacing: 2px; margin-bottom: 50px;}

        /* Fluid Orb from image */
        .ai-orb-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .ai-orb {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(138,43,226,0.3) 0%, rgba(0,255,255,0.3) 100%);
            box-shadow: 0 0 50px rgba(138,43,226,0.5), 0 0 80px rgba(0,255,255,0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        /* Pulse Animation (Blurred Color Outline) */
        .pulse-ring {
            position: absolute; width: 200px; height: 200px; border-radius: 50%;
            z-index: 1; opacity: 0; pointer-events: none;
        }
        .ai-orb-container.active .pulse-ring {
            opacity: 1; animation: multi-pulse 1.5s infinite;
        }

        @keyframes multi-pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
            50% { transform: scale(1.4); box-shadow: 0 0 60px #ff007f, 0 0 100px #8a2be2, 0 0 140px #00ff00; opacity: 0.8; }
            100% { transform: scale(1.1); box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="glass-box">
            <h2>AI Buddy Premium</h2>
            <p>Welcome, Michael! Verify your number to enable all premium features.</p>
            <p style="font-size: 12px; color: var(--primary-lime);">Rs. 100 / weekly subscription</p>
            <input type="text" id="user-name" placeholder="Name (e.g., Michael)" class="glass-input">
            <input type="text" id="user-phone" placeholder="+94 7X XXX XXXX" class="glass-input">
            <button class="btn-lime" onclick="verifyAndLogin()">Verify & Login</button>
        </div>
    </div>

    <div class="header">
        <div class="logo-area">
            <img src="icon.png" class="app-logo" alt="logo">
            <span class="app-name">AI Buddy</span>
        </div>
        <div style="font-size: 20px; color: var(--text-sub);">👤</div> </div>

    <div id="dashboard-mode">
        <div class="welcome-text">Hi, Michael 👋<br>How may I help you today?</div>

        <div class="options-grid">
            <div class="option-box box-big" onclick="enterTalkMode()">
                <div class="box-icon">🎤</div>
                <div class="fancy-textr">Premium Voice</div>
                <div class="box-title">TALK<br>WITH BOT</div>
            </div>

            <div class="option-box box-tall" style="background-color: rgba(138,43,226, 0.1);">
                <div class="box-icon">💬</div>
                <div class="fancy-textr">Singlish Chat</div>
                <div class="box-title">Chat with Bot</div>
            </div>

            <div class="option-box" style="background-color: rgba(255,105,180, 0.1);">
                <div class="box-icon">🖼️</div>
                <div class="fancy-textr">Vision API</div>
                <div class="box-title">Search by Image</div>
            </div>
            
            <div class="option-box">
                <div class="box-icon">⚙️</div>
                <div class="box-title">Settings</div>
            </div>
        </div>
    </div>

    <div id="talk-mode">
        <div class="exit-talk" onclick="exitTalkMode()">✕</div>
        <div class="ai-status" id="ai-status">Tap the Orb to Talk</div>
        
        <div class="ai-orb-container" id="orb-container">
            <div class="ai-orb" id="orb-btn"></div>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. KEYS SETUP (Added from previous conversations)
        const firebaseConfig = {
            apiKey: "AIzaSyDkwLEQW8G-ENm28R2qMeR_5hBVRXfjFoE",
            authDomain: "talk-to-me-1f57a.firebaseapp.com",
            projectId: "talk-to-me-1f57a",
            storageBucket: "talk-to-me-1f57a.firebasestorage.app",
            messagingSenderId: "698878046207",
            appId: "1:698878046207:web:2dbee851dd2dde984941ca"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const GEMINI_API = "AIzaSyBjd-VTrMUMVaGfaCR1pVMaGeeMDuA-LlU";
        const ELEVEN_KEY = "sk_c10165ba95470d51b2884d4777576c971135813ccfaf45c0";
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; // Bella (Conversational Female)

        // UI Management
        function verifyAndLogin() {
            // Simplistic login logic for UI demo
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
            }, 500);
        }

        function enterTalkMode() {
            document.getElementById('dashboard-mode').style.display = 'none';
            document.getElementById('talk-mode').style.display = 'flex';
        }

        function exitTalkMode() {
            document.getElementById('talk-mode').style.display = 'none';
            document.getElementById('dashboard-mode').style.display = 'flex';
            resetUI();
        }

        // 2. VOICE CORE (Functionality)
        const orbBtn = document.getElementById('orb-btn');
        const orbContainer = document.getElementById('orb-container');
        const statusTxt = document.getElementById('ai-status');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US'; // Adjust if browser supports Singlish

        // Logic for "Tap to Talk" on the Orb
        orbBtn.onclick = () => {
            recognition.start();
            orbContainer.classList.add('active');
            statusTxt.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            orbContainer.classList.remove('active');
            statusTxt.innerText = "Thinking...";

            // Get AI Answer
            const aiReply = await getAIResponse(userSpeech);
            
            // Speak Out
            statusTxt.innerText = "Speaking...";
            orbContainer.classList.add('active'); // Pulse while speaking
            await speak(aiReply);
            
            resetUI();
        };

        async function getAIResponse(userText) {
            // Bold, female Sri Lankan friend personality
            const prompt = `System: You are a bold, female Sri Lankan friend. You speak Singlish. If the user is annoying, be aggressive using slang like 'ballo', but usually be a cool friend. Current User Input: ${userText}`;
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_API}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function speak(text) {
            const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: "POST",
                headers: { "xi-api-key": ELEVEN_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });
            const blob = await res.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            return new Promise(resolve => {
                audio.onended = resolve;
                audio.play();
            });
        }

        function resetUI() {
            orbContainer.classList.remove('active');
            statusTxt.innerText = "Tap the Orb to Talk";
        }

    </script>
</body>
</html>
